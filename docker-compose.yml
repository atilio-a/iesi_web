services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iesi_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - iesi

  web:
    image: nginx:1.27-alpine
    container_name: iesi_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - iesi

  db:
    image: mysql:8.4
    container_name: iesi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: iesi_web
      MYSQL_USER: iesi_user
      MYSQL_PASSWORD: iesi_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - iesi_db:/var/lib/mysql
    networks:
      - iesi

networks:
  iesi:
    driver: bridge

volumes:
  iesi_db:
